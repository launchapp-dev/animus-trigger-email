name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Manifest probe
        run: |
          OUT=$(node dist/index.cjs --manifest)
          echo "$OUT"
          echo "$OUT" | node -e 'const fs=require("fs");const j=JSON.parse(fs.readFileSync(0,"utf8"));if(j.plugin_kind!=="trigger_backend"){console.error("expected plugin_kind=trigger_backend, got",j.plugin_kind);process.exit(1)}'
